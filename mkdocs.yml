site_name: !ENV [SITE_NAME, 'Millennium Machines']
site_url: !ENV [SITE_URL, 'https://millenniummachines.github.io/docs']
site_description: !ENV [SITE_DESCRIPTION, 'Documentation for Millennium Machines']
repo_url: https://github.com/MillenniumMachines/millenniummachines.github.io
edit_uri: !ENV [EDIT_URL, 'edit/main/docs/']

nav:
  - Home: index.md
  - "Milo 1.5 - Desktop CNC Mill":
    - Sourcing Guide: milo_1.5/bom/sourcing_guide.md
    - Printing Guide: milo_1.5/printing/print_guide.md
    - Frequently Asked Questions: milo_1.5/faq.md
    - Assembly Manual:
        - Acknowledgements: milo_1.5/manual/chapters/10_acknowledgements.md
        - Introduction: milo_1.5/manual/chapters/20_introduction.md
        - Hardware Reference: milo_1.5/manual/chapters/30_hardware_reference.md
        - Y-Axis Assembly: milo_1.5/manual/chapters/40_y_axis_assembly.md
        - X-Axis Assembly: milo_1.5/manual/chapters/50_x_axis_assembly.md
        - Z-Axis Assembly: milo_1.5/manual/chapters/60_z_axis_assembly.md
        - FMJ Assembly: milo_1.5/manual/chapters/70_fmj_assembly.md
        - Table Assembly: milo_1.5/manual/chapters/80_table_assembly.md
        - Install RRF: milo_1.5/manual/chapters/90_install_rrf.md
        - Assemble Electronics: milo_1.5/manual/chapters/100_assemble_electronics.md
        - Pre-Flight Checks: milo_1.5/manual/chapters/110_pre_flight_checks.md

  - "Milo 2.0 - Desktop CNC Mill":
    - Sourcing Guide: milo_2.0/bom/sourcing_guide.md
    - Printing Guide: milo_2.0/printing/print_guide.md
    - Frequently Asked Questions: milo_2.0/faq.md
    - "Assembly manual (PDF)": https://github.com/MillenniumMachines/Milo-V2.0/blob/main/Manual/MiloV2-Manual.pdf

  - "Universal Electronics Box":
    - Overview: ueb/index.md
    - Sourcing Guide: ueb/bom/sourcing_guide.md
    - Printing Guide: ueb/printing/print_guide.md
    - "Wiring reference (PDF)": https://github.com/MillenniumMachines/Universal-Electronics-Box/blob/main/Millennium%20Universal%20CNC%20wiring%20.pdf

  - "Casa - Desktop CNC Enclosure":
    - Sourcing Guide: casa/bom/sourcing_guide.md
    - Printing Guide: casa/bom/printing_guide.md
    - Frequently Asked Questions: casa/faq.md
    - Assembly Manual:
      - Introduction: casa/manual/chapters/00_introduction.md
      - Outer Frame Assembly: casa/manual/chapters/10_outer_frame_assembly.md
      - Sliding Door Assembly: casa/manual/chapters/20_sliding_door_assembly.md
      - Panels and Clips: casa/manual/chapters/30_panels_and_clips.md
      - Electronics Bay: casa/manual/chapters/40_electronics.md
      - Basement: casa/manual/chapters/50_basement.md

  - "Long John Toolsetter":
    - Sourcing and Print Guild: long-john/bom/sourcing_and_print_guide.md
    - Assembly Manual: long-john/assembly_manual/assembly_manual.md
  - "MillenniumOS / NeXT":
    - "NeXT (in progress)": millennium-os/manual/chapters/00_next_wip.md
    - Introduction: millennium-os/manual/chapters/10_introduction.md
    - Installation: millennium-os/manual/chapters/20_installation.md
    - Usage: millennium-os/manual/chapters/30_usage.md
    - G-Codes: millennium-os/manual/chapters/40_gcodes.md
  - "Contact Us": contact-us.md

extra:
  SITE_INTRO: !ENV
    - SITE_INTRO
    - |
      Welcome to the Millennium Machines documentation site.
      Here you can find guides on how to source, build,
      and maintain your own **Millennium Machine**!

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - macros

theme:
  name: material
  font:
    text: Roboto
  logo: img/millennium-machines-icon.png
  icon:
    logo: fontawesome/solid/industry
    annotation: material/wrench-outline
  favicon: img/millennium-machines-icon.png
  palette:
    scheme: slate
    primary: red
    accent: custom

  features:
    - content.code.annotate
    - content.action.edit
    - navigation.tracking

markdown_extensions:
  - abbr
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
